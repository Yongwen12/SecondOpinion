      catch (_) { return {}; }
    }

    function saveVoteState(votes) {
      try { localStorage.setItem('secondOpinion-v03-votes', JSON.stringify(votes)); }
      catch (_) {}
    }

    const voteState = loadVoteState();

    function voteCounts(comment) {
      const selected = voteState[comment.chunk] || null;
      return {
        selected,
        up: comment.up + (selected === 'up' ? 1 : 0),
        down: comment.down + (selected === 'down' ? 1 : 0)
      };
    }

    function renderComments() {
      threadList.innerHTML = splitComments.map(comment => {
        const reviewer = reviewers.find(item => item.id === comment.id);
        const counts = voteCounts(comment);
        const hidden = state.commentFilter !== 'ALL' && state.commentFilter !== comment.id;
        const tone = toneMap[comment.tone] || toneMap.gold;
        return `
          <article class="comment-row${hidden ? ' is-hidden' : ''}" data-comment-id="${comment.id}" data-chunk="${comment.chunk}" style="--reviewer-color:${tone.color};--reviewer-soft:${tone.soft};">
            <div class="pixel-avatar" aria-hidden="true">${avatarSvg[reviewer?.avatar || comment.id] || avatarSvg.R1}</div>
            <div class="comment-main">
              <div class="comment-meta">
                <span class="comment-id">${reviewer?.name || comment.id}</span>
                <span class="chunk-id">${comment.chunk}</span>
                <span class="status-badge ${toneClass(comment.tone)}">${reviewer?.label || 'Review comment'}</span>
              </div>
              <p class="viewpoint">${comment.view}</p>
              <div class="ai-comment"><span class="ai-mark">SO</span><span>${comment.ai}</span></div>
            </div>
            <div class="vote-group" aria-label="Vote on ${comment.chunk}">
              <button class="vote-button${counts.selected === 'up' ? ' is-up' : ''}" type="button" data-vote="up" data-chunk="${comment.chunk}" aria-pressed="${counts.selected === 'up'}" aria-label="Like"><span class="vote-icon">${THUMB_UP}</span><span>${counts.up}</span></button>
              <button class="vote-button${counts.selected === 'down' ? ' is-down' : ''}" type="button" data-vote="down" data-chunk="${comment.chunk}" aria-pressed="${counts.selected === 'down'}" aria-label="Dislike"><span class="vote-icon">${THUMB_DOWN}</span><span>${counts.down}</span></button>
            </div>
          </article>`;
      }).join('');
      syncLinkedReviewer();
    }

    function renderAll() {
      renderOverallScore();
      renderReviewerCards();
      renderScoreDetail();
      renderCloud();
      renderFilters();
      renderComments();
    }

    function selectReviewer(id) {
      state.selectedReviewer = state.selectedReviewer === id ? null : id;
      renderReviewerCards();
      renderScoreDetail();
      if (state.selectedReviewer && window.innerWidth < 680) {
        window.setTimeout(() => scoreDetail.scrollIntoView({ behavior: reducedMotion.matches ? 'auto' : 'smooth', block: 'nearest' }), 80);
      }
    }

    function syncLinkedReviewer() {
      document.querySelectorAll('.cloud-word').forEach(word => {
        word.classList.toggle('is-linked', Boolean(state.selectedReviewer) && word.dataset.reviewer === state.selectedReviewer);
      });
      document.querySelectorAll('.comment-row').forEach(row => {
        row.classList.toggle('is-linked', Boolean(state.selectedReviewer) && row.dataset.commentId === state.selectedReviewer);
      });
    }

    function applyCommentFilter(filter) {
      state.commentFilter = filter;
      renderFilters();
      renderComments();
    }

    function updateVote(chunk, action) {
      const current = voteState[chunk] || null;
      voteState[chunk] = current === action ? null : action;
      saveVoteState(voteState);
      renderComments();
      showToast(voteState[chunk] ? 'Vote recorded' : 'Vote removed');
    }

    function cloudLimits() {
      const stageW = cloudStage.clientWidth;
      const stageH = cloudStage.clientHeight;
      const scaledW = 1080 * state.cloud.scale;
      const scaledH = 520 * state.cloud.scale;
      const margin = 90;
      return {
        minX: Math.min(margin, stageW - scaledW - margin),
        maxX: Math.max(-margin, stageW - scaledW + margin),
        minY: Math.min(margin, stageH - scaledH - margin),
        maxY: Math.max(-margin, stageH - scaledH + margin)
      };
    }

    function setCloudTransform(x, y) {
      const limits = cloudLimits();
      state.cloud.x = Math.max(limits.minX, Math.min(limits.maxX, x));
      state.cloud.y = Math.max(limits.minY, Math.min(limits.maxY, y));
      cloudCanvas.style.transform = `translate3d(${state.cloud.x}px, ${state.cloud.y}px, 0) scale(${state.cloud.scale})`;
    }

    function resetCloudView() {
      if (!cloudStage.clientWidth) return;
      const fitX = (cloudStage.clientWidth - 34) / 1080;
      const fitY = (cloudStage.clientHeight - 34) / 520;
      state.cloud.scale = Math.max(window.innerWidth < 680 ? .58 : .72, Math.min(1, fitX, fitY));
      const x = (cloudStage.clientWidth - 1080 * state.cloud.scale) / 2;
      const y = (cloudStage.clientHeight - 520 * state.cloud.scale) / 2;
      setCloudTransform(x, y);
      hideCloudTooltip(true);
    }

    function tooltipMarkup(word) {
      return `<div class="tooltip-head"><span class="tooltip-keyword">${word.text}</span><span class="tooltip-reviewer">${word.reviewerName || word.reviewer}</span></div><p class="tooltip-chunk">${word.chunk}</p>`;
    }

    function showCloudTooltip(wordIndex, clientX, clientY, pinned = false) {
      const word = cloudWords[wordIndex];
      if (!word) return;
      cloudTooltip.innerHTML = tooltipMarkup(word);
      cloudTooltip.classList.add('is-visible');
      cloudTooltip.dataset.pinned = pinned ? 'true' : 'false';
      state.cloud.pinnedWord = pinned ? wordIndex : state.cloud.pinnedWord;

      document.querySelectorAll('.cloud-word').forEach(el => el.classList.toggle('is-pinned', pinned && Number(el.dataset.wordIndex) === wordIndex));

      const stageRect = cloudStage.getBoundingClientRect();
      const tooltipWidth = Math.min(360, stageRect.width - 24);
      const localX = Number.isFinite(clientX) ? clientX - stageRect.left + 14 : stageRect.width / 2 - tooltipWidth / 2;
      const localY = Number.isFinite(clientY) ? clientY - stageRect.top + 16 : stageRect.height / 2;
      const left = Math.max(12, Math.min(stageRect.width - tooltipWidth - 12, localX));
      const estimatedHeight = 104;
      const top = Math.max(12, Math.min(stageRect.height - estimatedHeight - 12, localY));
      cloudTooltip.style.left = `${left}px`;
      cloudTooltip.style.top = `${top}px`;
    }

    function hideCloudTooltip(force = false) {
      if (!force && cloudTooltip.dataset.pinned === 'true') return;
      cloudTooltip.classList.remove('is-visible');
      cloudTooltip.dataset.pinned = 'false';
      state.cloud.pinnedWord = null;
      document.querySelectorAll('.cloud-word.is-pinned').forEach(el => el.classList.remove('is-pinned'));
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('is-visible');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('is-visible'), 1300);
    }

    function resetToSearch() {
      body.classList.remove('is-resolved');
      body.classList.add('is-idle');
      hideCloudTooltip(true);
      renderCommunityHome();
      window.setTimeout(() => {
        landingInput.focus();
        landingInput.setSelectionRange(landingInput.value.length, landingInput.value.length);
      }, 0);
    }

    document.getElementById('landingSearch').addEventListener('submit', event => {
      event.preventDefault();
      submitPaper(landingInput.value, 'landing');
    });

    document.getElementById('topSearch').addEventListener('submit', event => {
      event.preventDefault();
      submitPaper(topInput.value, 'top');
    });

    landingInput.addEventListener('input', () => {
      landingError.textContent = '';
      document.getElementById('landingSearch').classList.remove('is-invalid');
      topInput.value = landingInput.value;
      syncClearButtons();
    });

    topInput.addEventListener('input', () => {
      landingInput.value = topInput.value;
      syncClearButtons();
    });

    landingClear.addEventListener('click', () => { setInputValue(''); landingInput.focus(); });
    topClear.addEventListener('click', () => { setInputValue(''); topInput.focus(); });
    document.getElementById('homeButton').addEventListener('click', resetToSearch);
    document.getElementById('resetCloud').addEventListener('click', resetCloudView);

    document.addEventListener('click', event => {
      const modalClose = event.target.closest('[data-modal-close]');
      if (modalClose) {
        closeRateModal();
        return;
      }

      const rateChoice = event.target.closest('[data-rate-choice]');
      if (rateChoice) {
        submitRateVote(rateChoice.dataset.rateChoice);
        return;
      }

      const paperPick = event.target.closest('[data-paper-pick]');
      if (paperPick) {
        selectRatePaper(paperPick.dataset.paperPick);
        return;
      }

      const reviewerPick = event.target.closest('[data-reviewer-pick]');
      if (reviewerPick) {
        selectRateReviewer(reviewerPick.dataset.reviewerPick);
        return;
      }

      const tabButton = event.target.closest('[data-board-tab]');
      if (tabButton) {
        homeBoardKind = BOARD_ORDER.includes(tabButton.dataset.boardTab) ? tabButton.dataset.boardTab : 'overall';
        setBoardDeepLink(homeBoardKind);
        if (usingDemoHome) {
          homeTickerHtml = homeBoardKind === 'helpful'
            ? '<span class="hl">⚡ 24 human ratings this week</span> · latest: <b>“I owe this reviewer a beer”</b> on Reviewer #17 — 12 min ago'
            : '<span class="hl">⚡ 24 human ratings this week</span> · latest: <b>“brutal but fair”</b> on Reviewer #4 — 2 min ago';
        }
        renderCommunityBoard();
        return;
      }

      const openRateButton = event.target.closest('[data-open-rate]');
      if (openRateButton) {
        openRateModal(null, 'global');
        return;
      }

      const rowRateButton = event.target.closest('[data-row-rate]');
      if (rowRateButton) {
        event.preventDefault();
        event.stopPropagation();
        const row = currentBoardRow(rowRateButton.dataset.rowRate);
        if (row) openRateModal(row, 'row');
        return;
      }

      const boardRow = event.target.closest('[data-board-row]');
      if (boardRow) {
        openBoardRow(boardRow.dataset.boardRow);
        return;
      }

      const paperResultButton = event.target.closest('[data-paper-result-index]');
      if (paperResultButton) {
        const source = paperResultButton.closest('#topResults') ? 'top' : 'landing';
        const item = paperSearchResults[Number(paperResultButton.dataset.paperResultIndex)];
        if (!item) return;
        setBusy(true, source);
        loadScorecardFromApi(item.paper_id, source, item).catch(error => {
          console.warn('Paper result load failed.', error);
          showToast('Could not load this paper');
        }).finally(() => setBusy(false, source));
        return;
      }

      const reviewerVoteButton = event.target.closest('[data-reviewer-vote]');
      if (reviewerVoteButton) {
        updateReviewerVote(reviewerVoteButton.dataset.reviewerId, reviewerVoteButton.dataset.reviewerVote);
        return;
      }

      const leaderButton = event.target.closest('[data-leader-reviewer]');
      if (leaderButton) {
        selectReviewer(leaderButton.dataset.leaderReviewer);
        return;
      }

      const reviewerButton = event.target.closest('.reviewer-card[data-reviewer]');
      if (reviewerButton) {
        selectReviewer(reviewerButton.dataset.reviewer);
        return;
      }

      const filterButton = event.target.closest('[data-filter]');
      if (filterButton) {
        applyCommentFilter(filterButton.dataset.filter);
        return;
      }

      const voteButton = event.target.closest('[data-vote]');
      if (voteButton) {
        updateVote(voteButton.dataset.chunk, voteButton.dataset.vote);
        return;
      }

      const wordButton = event.target.closest('.cloud-word');
      if (wordButton) {
        if (state.cloud.moved) {
          event.preventDefault();
          return;
        }
        const index = Number(wordButton.dataset.wordIndex);
        showCloudTooltip(index, event.clientX, event.clientY, true);
        state.selectedReviewer = wordButton.dataset.reviewer;
        renderReviewerCards();
        renderScoreDetail();
        return;
      }

      if (event.target === cloudStage) hideCloudTooltip(true);
    });

    let rateSearchTimer;
    rateModal.addEventListener('input', event => {
      if (event.target?.id !== 'ratePaperSearch') return;
      window.clearTimeout(rateSearchTimer);
      const query = event.target.value;
      rateSearchTimer = window.setTimeout(() => loadRatePapers(query), 220);
    });

    rateModal.addEventListener('change', event => {
      if (event.target?.id !== 'rateVenue') return;
      rateContext.conference = event.target.value;
      rateContext.paperResults = [];
      rateContext.reviewerResults = [];
      loadRatePapers(rateContext.query || '');
    });

    rateModal.addEventListener('submit', event => {
      if (!event.target.closest('[data-comment-form]')) return;
      event.preventDefault();
      submitReviewerComment();
    });

    scoreDetail.addEventListener('submit', event => {
      const form = event.target.closest('[data-sc-comment-form]');
      if (!form) return;
      event.preventDefault();
      submitScorecardComment(form.dataset.scCommentForm);
    });

    outrageBoard.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      const row = event.target.closest('[data-board-row]');
      if (!row) return;
      event.preventDefault();
      openBoardRow(row.dataset.boardRow);
    });

    boardTabs.addEventListener('keydown', event => {
      if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
      event.preventDefault();
      const currentIndex = BOARD_ORDER.indexOf(homeBoardKind);
      const delta = event.key === 'ArrowRight' ? 1 : -1;
      const next = BOARD_ORDER[(currentIndex + delta + BOARD_ORDER.length) % BOARD_ORDER.length];
      homeBoardKind = next;
      setBoardDeepLink(next);
      renderCommunityBoard();
      boardTabs.querySelector(`[data-board-tab="${next}"]`)?.focus();
    });
    cloudStage.addEventListener('pointermove', event => {
      if (state.cloud.dragging) {
        const dx = event.clientX - state.cloud.startX;
        const dy = event.clientY - state.cloud.startY;
        if (Math.abs(dx) + Math.abs(dy) > 5) state.cloud.moved = true;
        setCloudTransform(state.cloud.originX + dx, state.cloud.originY + dy);
        return;
      }

      if (cloudTooltip.dataset.pinned === 'true') return;
      const word = event.target.closest('.cloud-word');
      if (word) showCloudTooltip(Number(word.dataset.wordIndex), event.clientX, event.clientY, false);
      else hideCloudTooltip();
    });

    cloudStage.addEventListener('pointerleave', () => {
      if (cloudTooltip.dataset.pinned !== 'true') hideCloudTooltip();
    });

    cloudStage.addEventListener('focusin', event => {
      const word = event.target.closest('.cloud-word');
      if (word) showCloudTooltip(Number(word.dataset.wordIndex), NaN, NaN, false);
    });

    cloudStage.addEventListener('focusout', event => {
      if (event.target.closest('.cloud-word') && cloudTooltip.dataset.pinned !== 'true') hideCloudTooltip();
    });

    cloudStage.addEventListener('pointerdown', event => {
      if (event.target.closest('.cloud-word')) return;
      state.cloud.dragging = true;
      state.cloud.moved = false;
      state.cloud.startX = event.clientX;
      state.cloud.startY = event.clientY;
      state.cloud.originX = state.cloud.x;
      state.cloud.originY = state.cloud.y;
      cloudStage.classList.add('is-dragging');
      cloudStage.setPointerCapture(event.pointerId);
    });

    function endCloudDrag(event) {
      state.cloud.dragging = false;
      cloudStage.classList.remove('is-dragging');
      try { cloudStage.releasePointerCapture(event.pointerId); } catch (_) {}
      window.setTimeout(() => { state.cloud.moved = false; }, 0);
    }

    cloudStage.addEventListener('pointerup', endCloudDrag);
    cloudStage.addEventListener('pointercancel', endCloudDrag);

    cloudStage.addEventListener('keydown', event => {
      const step = event.shiftKey ? 48 : 22;
      if (event.key === 'ArrowLeft') { event.preventDefault(); setCloudTransform(state.cloud.x + step, state.cloud.y); }
      if (event.key === 'ArrowRight') { event.preventDefault(); setCloudTransform(state.cloud.x - step, state.cloud.y); }
      if (event.key === 'ArrowUp') { event.preventDefault(); setCloudTransform(state.cloud.x, state.cloud.y + step); }
      if (event.key === 'ArrowDown') { event.preventDefault(); setCloudTransform(state.cloud.x, state.cloud.y - step); }
      if (event.key === 'Home') { event.preventDefault(); resetCloudView(); }
      if (event.key === 'Escape') hideCloudTooltip(true);
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && rateModal && !rateModal.hidden) {
        closeRateModal();
        return;
      }
      const typing = /INPUT|TEXTAREA|SELECT/.test(document.activeElement?.tagName || '');
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        (body.classList.contains('is-idle') ? landingInput : topInput).focus();
      }
      if (!typing && event.key === '/') {
        event.preventDefault();
        (body.classList.contains('is-idle') ? landingInput : topInput).focus();
      }
      if (event.key === 'Escape' && state.selectedReviewer) {
        state.selectedReviewer = null;
        renderReviewerCards();
        renderScoreDetail();
      }
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(resetCloudView, 120);
    });

    syncClearButtons();

    const params = new URLSearchParams(location.search);
    loadPublicScorecard().then(() => {
      renderAll();
      loadCommunityHome();
    });
  </script>
</body>
</html>
