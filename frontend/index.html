<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Judge My Reviewers - The Verdict</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --surface: #fffefa;
      --surface-2: #faf7f0;
      --surface-3: #f3eee4;
      --ink: #191918;
      --ink-2: #3e3c38;
      --muted: #77736c;
      --line: #e4ded3;
      --line-strong: #cbc2b4;
      --lime: #b9f34c;
      --lime-soft: #effbd7;
      --green: #16795a;
      --green-soft: #eaf6f0;
      --blue: #2e65a8;
      --blue-soft: #edf3fb;
      --gold: #a76e16;
      --gold-soft: #fbf1da;
      --red: #a7473f;
      --red-soft: #faece9;
      --shadow-1: 0 1px 2px rgba(24, 24, 22, .04), 0 10px 30px rgba(24, 24, 22, .055);
      --shadow-2: 0 18px 60px rgba(24, 24, 22, .09);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --focus: 0 0 0 4px rgba(22, 121, 90, .15);
      --ease: cubic-bezier(.2, .75, .25, 1);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: #f6f7f5;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input { font: inherit; }
    button { border: 0; }
    button, [role="button"] { -webkit-tap-highlight-color: transparent; }

    button:focus-visible,
    input:focus-visible,
    [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 56px;
    }

    .is-idle .shell {
      width: 100%;
      padding: 0;
    }

    .landing {
      min-height: 100svh;
      display: block;
      padding: 18px 24px 32px;
    }

    .community-home {
      width: min(1600px, calc(100vw - 48px));
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .community-hero {
      display: grid;
      gap: 12px;
      padding-top: 10px;
    }

    .community-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .community-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .community-copy {
      display: grid;
      gap: 4px;
      max-width: 720px;
    }

    .community-copy h1 {
      margin: 0;
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .community-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .topic-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topic-chip {
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 254, 250, .72);
      color: var(--ink-2);
      font-size: 12px;
      font-weight: 800;
    }

    .topic-chip.is-active {
      border-color: var(--ink);
      background: var(--lime-soft);
      color: var(--ink);
    }

    .community-grid {
      display: grid;
      grid-template-columns: clamp(180px, 20%, 230px) minmax(0, 1fr) clamp(180px, 20%, 230px);
      gap: 28px;
      align-items: start;
    }

    .feed-panel,
    .community-board {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow-1);
    }

    .feed-panel { padding: 10px; }
    .community-board {
      padding: 10px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 4px 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-kicker,
    .panel-note {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .panel-note {
      max-width: 42rem;
      margin: 4px 0 0;
      line-height: 1.35;
    }

    .panel-note strong { color: var(--ink-2); }

    .home-status {
      padding: 11px 13px;
      border: 1px solid rgba(167, 71, 63, .22);
      border-radius: 12px;
      background: var(--red-soft);
      color: var(--red);
      font-size: 13px;
      font-weight: 760;
    }

    .home-status[hidden] { display: none; }

    .home-paper-list,
    .community-board-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .home-paper-card,
    .community-board-row {
      width: 100%;
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: background .16s var(--ease), border-color .16s var(--ease), transform .16s var(--ease);
    }

    .home-paper-card:hover,
    .community-board-row:hover {
      border-color: var(--line-strong);
      background: var(--surface);
      transform: translateY(-1px);
    }

    .home-paper-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 16px;
      font-weight: 850;
      line-height: 1.24;
    }

    .home-paper-meta,
    .home-paper-social,
    .board-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .home-paper-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .home-paper-tags span {
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--surface-3);
      color: var(--ink-2);
      font-size: 11px;
      font-weight: 800;
    }

    .paper-score-pill {
      justify-self: start;
      min-width: 48px;
      padding: 5px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: var(--lime-soft);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
      font-weight: 900;
    }

    .board-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }

    .board-tab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--ink-2);
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
    }

    .board-tab.is-active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--surface);
    }
    .home-boards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .home-board {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(250, 251, 249, .78);
      padding: 10px;
    }

    .home-board--red { border-top: 3px solid var(--red); }
    .home-board--black { border-top: 3px solid #2c2a28; }
    .home-board--red .board-title { color: var(--red); }
    .home-board--black .board-title { color: #2c2a28; }
    .home-board { padding: 9px 10px 11px; position: sticky; top: 16px; box-shadow: var(--shadow-1); border-color: var(--line-strong); }
    .home-board .board-title { font-size: 13px; }
    .board-vote { margin-top: 5px; }
    .board-vote .vote-button { min-width: 0; height: 28px; padding: 0 9px; }

    .board-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 4px 12px;
    }

    .board-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .board-subtitle {
      color: var(--muted);
      font-size: 12px;
      font-weight: 780;
    }

    .board-rank {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .board-paper-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.28;
    }

    .mobile-board-tabs {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mobile-board-tab {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--surface-2);
      color: var(--ink-2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 850;
    }

    .mobile-board-tab.is-active {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--surface);
    }
    .app-view { display: block; }
    .is-idle .app-view { display: none; }
    .is-resolved .landing { display: none; }

    .search-shell {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 254, 250, .94);
      box-shadow: var(--shadow-2);
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease), transform .2s var(--ease);
    }

    .search-shell:focus-within {
      border-color: rgba(22, 121, 90, .56);
      box-shadow: var(--shadow-2), var(--focus);
    }

    .search-shell.is-invalid {
      border-color: rgba(167, 71, 63, .8);
      animation: nudge .24s ease-in-out 2;
    }

    .search-shell--landing {
      width: min(860px, calc(100vw - 32px));
      min-height: 72px;
      padding: 8px 8px 8px 18px;
      border-radius: 24px;
    }

    .search-shell--compact {
      width: min(590px, 58vw);
      min-height: 46px;
      padding: 5px 5px 5px 12px;
      border-radius: 15px;
      box-shadow: none;
      background: rgba(255, 254, 250, .82);
    }

    .search-shell--compact:focus-within {
      box-shadow: var(--focus);
      background: var(--surface);
    }

    .search-icon {
      display: grid;
      place-items: center;
      width: 24px;
      color: var(--muted);
    }

    .search-icon svg { width: 19px; height: 19px; }

    .search-input {
      min-width: 0;
      width: 100%;
      height: 100%;
      padding: 0 4px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .search-shell--landing .search-input { font-size: clamp(16px, 1.6vw, 19px); }
    .search-input::placeholder { color: #9a958c; font-weight: 500; }

    .clear-button,
    .icon-button,
    .close-button {
      display: inline-grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color .16s ease, background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .clear-button {
      width: 34px;
      height: 34px;
      font-size: 19px;
      line-height: 1;
    }

    .clear-button:hover,
    .icon-button:hover,
    .close-button:hover {
      color: var(--ink);
      background: var(--surface-3);
      border-color: var(--line);
    }

    .clear-button[hidden] { display: none; }

    .analyze-button {
      position: relative;
      min-width: 126px;
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 18px;
      border: 1px solid var(--ink);
      border-radius: 16px;
      background: var(--lime);
      color: #131711;
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      font-weight: 750;
      letter-spacing: -.01em;
      transition: transform .16s var(--ease), box-shadow .16s var(--ease), filter .16s ease;
    }

    .search-shell--compact .analyze-button {
      min-width: 44px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 11px;
      box-shadow: none;
    }

    .analyze-button:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ink);
      filter: saturate(1.03);
    }

    .search-shell--compact .analyze-button:hover { box-shadow: 2px 2px 0 var(--ink); }
    .analyze-button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
    .analyze-button:disabled { cursor: progress; filter: saturate(.55); }

    .button-arrow {
      font-size: 20px;
      line-height: 1;
      transition: transform .18s var(--ease);
    }

    .analyze-button:hover .button-arrow { transform: translateX(2px); }

    .spinner {
      display: none;
      width: 17px;
      height: 17px;
      border: 2px solid rgba(19, 23, 17, .24);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .analyze-button.is-busy .button-arrow { display: none; }
    .analyze-button.is-busy .spinner { display: inline-block; }

    .input-error {
      min-height: 18px;
      color: var(--red);
      font-size: 12px;
      font-weight: 650;
    }

    .search-results {
      width: min(860px, calc(100vw - 32px));
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: rgba(255, 254, 250, .96);
      box-shadow: var(--shadow-1);
    }

    .search-results[hidden] { display: none; }

    .search-results--compact {
      position: absolute;
      top: 64px;
      right: 10px;
      width: min(590px, calc(100vw - 32px));
      z-index: 40;
    }

    .paper-result-card {
      width: 100%;
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .paper-result-card:hover {
      border-color: var(--line);
      background: var(--surface-3);
    }

    .paper-result-card strong {
      font-size: 13px;
      line-height: 1.32;
    }

    .paper-result-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .empty-state {
      padding: 16px;
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      background: rgba(255, 254, 250, .66);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 14px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      min-height: 66px;
      margin: -18px -10px 16px;
      padding: 10px;
      background: linear-gradient(to bottom, rgba(244, 241, 234, .94), rgba(244, 241, 234, .78));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.025em;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--ink);
      border-radius: 9px;
      background: var(--lime);
      box-shadow: 2px 2px 0 var(--ink);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: -.02em;
    }

    .content-stack {
      display: grid;
      gap: 16px;
    }

    .surface {
      border: 1px solid rgba(25, 25, 24, .09);
      border-radius: var(--radius-xl);
      background: rgba(255, 254, 250, .94);
      box-shadow: var(--shadow-1);
      overflow: clip;
    }

    .score-section {
      display: grid;
      grid-template-columns: 188px minmax(0, 1fr);
      gap: 22px;
      padding: 22px;
    }

    .score-overview {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 12px;
      min-height: 194px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(160deg, #fff, var(--surface-2));
    }

    .score-ring {
      --score: 73;
      position: relative;
      width: 132px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--green) calc(var(--score) * 1%), #ebe6dc 0);
      isolation: isolate;
    }

    .score-ring::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: inherit;
      background: var(--surface);
      box-shadow: inset 0 0 0 1px rgba(25, 25, 24, .05);
      z-index: -1;
    }

    .score-value {
      display: grid;
      justify-items: center;
      font-variant-numeric: tabular-nums;
    }

    .score-value strong {
      font-size: 47px;
      line-height: .92;
      font-weight: 820;
      letter-spacing: -.065em;
    }

    .score-value span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .signal-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(22, 121, 90, .18);
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 11px;
      font-weight: 760;
    }

    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 4px rgba(22, 121, 90, .09);
    }

    .score-main {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 13px;
    }

    .paper-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-width: 0;
    }

    .paper-title {
      min-width: 0;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: clamp(20px, 2vw, 25px);
      font-weight: 780;
      letter-spacing: -.045em;
    }

    .paper-stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .paper-stats span + span::before {
      content: "/";
      margin-right: 8px;
      color: var(--line-strong);
    }

    .reviewer-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .reviewer-card {
      min-width: 0;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 78px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-2);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: border-color .18s ease, background .18s ease, transform .18s var(--ease), box-shadow .18s ease;
    }

    .reviewer-card:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: var(--surface);
      box-shadow: 0 8px 22px rgba(25, 25, 24, .06);
    }

    .reviewer-card.is-active {
      border-color: var(--ink);
      background: var(--surface);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .mini-avatar,
    .pixel-avatar {
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
      border: 1px solid var(--ink);
      background: #fff;
      image-rendering: pixelated;
    }

    .mini-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .reviewer-card-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .reviewer-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink-2);
      font-size: 12px;
      font-weight: 680;
    }

    .reviewer-score-line {
      display: flex;
      align-items: baseline;
      gap: 7px;
      font-variant-numeric: tabular-nums;
    }

    .reviewer-score-line strong {
      font-size: 24px;
      line-height: 1;
      font-weight: 820;
      letter-spacing: -.05em;
    }

    .tone-label {

      color: var(--muted);

      font-weight: 700;
    }

    .chevron {

      place-items: center;

    .reviewer-card:hover .chevron { background: var(--surface-3); color: var(--ink); }

    .score-detail {
      display: grid;

      transform: translateY(-4px);

    }

    .score-detail.is-open {
      grid-template-rows: 1fr;
      opacity: 1;
      transform: translateY(0);
    }

    .score-detail-clip { overflow: hidden; }

    .score-detail-card {
      display: grid;

      margin-top: 1px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-2);
    }

    .detail-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .detail-copy { min-width: 0; }

    .detail-name {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 780;
      letter-spacing: -.02em;
    }

    .detail-summary {
      margin: 0;
      color: var(--ink-2);
      font-size: 13px;
      line-height: 1.5;
    }

    .detail-score {
      min-width: 54px;
      min-height: 32px;
      display: inline-grid;
      place-items: center;
      padding: 0 9px;
      border: 1px solid currentColor;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .tone-green { color: var(--green); background: var(--green-soft); }
    .tone-blue { color: var(--blue); background: var(--blue-soft); }
    .tone-gold { color: var(--gold); background: var(--gold-soft); }
    .tone-red { color: var(--red); background: var(--red-soft); }

    .dimension-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .metric {
      display: grid;
      gap: 7px;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface);
    }

    .metric-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 720;
    }

    .metric-head strong {
      font-size: 13px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .metric-track {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #ece6dc;
    }

    .metric-fill {
      width: 0;
      height: 100%;

      border-radius: inherit;
      background: var(--green);
      transition: width .62s var(--ease);
    }

    .metric-fill.blue { background: var(--blue); }
    .metric-fill.gold { background: var(--gold); }
    .metric-fill.red { background: var(--red); }

    .criterion {
      min-height: 30px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.4;
    }

    .score-guide {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      padding-top: 1px;
    }

    .guide-item {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      white-space: nowrap;
    }

    .guide-swatch {
      width: 18px;
      height: 5px;
      border-radius: 99px;
      background: var(--red);
      flex: 0 0 auto;
    }

    .guide-item:nth-child(2) .guide-swatch { background: var(--gold); }
    .guide-item:nth-child(3) .guide-swatch { background: var(--blue); }
    .guide-item:nth-child(4) .guide-swatch { background: var(--green); }

    .detail-comments {
      margin-top: 15px;
      padding-top: 13px;
      border-top: 1px solid var(--line);
    }

    .detail-comment-status {
      margin: 8px 0 0;
      min-height: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      padding: 13px 17px;
      border-bottom: 1px solid var(--line);
    }

    .section-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 770;
      letter-spacing: -.025em;
    }

    .section-tools {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      font-size: 17px;
    }

    .leaderboard-section {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .leaderboard-card { min-width: 0; }

    .leaderboard-kicker {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .leaderboard-card--red .section-head h2 { color: var(--green); }
    .leaderboard-card--black .section-head h2 { color: var(--red); }

    .leaderboard-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 12px;
      list-style: none;
    }

    .leaderboard-list li {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .leaderboard-list .vote-group {
      padding: 2px;
      background: var(--surface);
    }

    .leaderboard-list .vote-button {
      min-width: 42px;
      height: 29px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 26px 40px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--ink);
      text-align: left;
      transition: border-color .16s ease, background .16s ease, transform .16s var(--ease);
    }

    .leaderboard-row:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: var(--surface);
    }

    .leader-rank {
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .leader-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .leader-copy strong,
    .leader-copy span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leader-copy strong {
      font-size: 13px;
      font-weight: 780;
    }

    .leader-copy span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .leader-score {
      color: var(--ink);
      font-size: 18px;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .cloud-stage {
      position: relative;
      height: 370px;
      margin: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        linear-gradient(rgba(25, 25, 24, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(25, 25, 24, .025) 1px, transparent 1px),
        radial-gradient(circle at 18% 18%, rgba(185, 243, 76, .16), transparent 28%),
        radial-gradient(circle at 80% 74%, rgba(46, 101, 168, .10), transparent 31%),
        #fcfbf7;
      background-size: 32px 32px, 32px 32px, auto, auto, auto;
      cursor: grab;
      touch-action: none;
      user-select: none;
      overscroll-behavior: contain;
    }

    .cloud-stage.is-dragging { cursor: grabbing; }

    .cloud-canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 1080px;
      height: 520px;
      transform-origin: 0 0;
      will-change: transform;
    }

    .cloud-word {
      position: absolute;
      display: inline-flex;
      align-items: center;
      padding: 4px 8px 5px;
      border: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, .28);
      color: var(--ink);
      cursor: help;
      font-weight: 780;
      line-height: 1;
      letter-spacing: -.045em;
      white-space: nowrap;
      transition: transform .16s var(--ease), background .16s ease, box-shadow .16s ease, opacity .16s ease;
    }

    .cloud-word:hover,
    .cloud-word:focus-visible,
    .cloud-word.is-pinned {
      transform: translateY(-2px) scale(1.025);
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 8px 22px rgba(25, 25, 24, .1);
      z-index: 3;
    }

    .cloud-word.is-linked {
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 0 0 2px currentColor, 0 8px 22px rgba(25, 25, 24, .08);
      z-index: 2;
    }

    .cloud-word[data-tone="green"] { color: var(--green); }
    .cloud-word[data-tone="blue"] { color: var(--blue); }
    .cloud-word[data-tone="gold"] { color: var(--gold); }
    .cloud-word[data-tone="red"] { color: var(--red); }

    .cloud-tooltip {
      position: absolute;
      z-index: 10;
      width: min(360px, calc(100% - 24px));
      display: grid;
      gap: 6px;
      padding: 11px 12px;
      border: 1px solid var(--ink);
      border-radius: 14px;
      background: rgba(255, 254, 250, .97);
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink), 0 14px 36px rgba(25, 25, 24, .12);
      pointer-events: none;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .12s ease, transform .12s var(--ease);
    }

    .cloud-tooltip.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .tooltip-keyword {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
    }

    .tooltip-reviewer {
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      white-space: nowrap;
    }

    .tooltip-chunk {
      margin: 0;
      color: var(--ink-2);
      font-size: 12px;
      line-height: 1.48;
    }

    .cloud-corner {
      position: absolute;
      right: 11px;
      bottom: 10px;
      display: flex;
      gap: 5px;
      pointer-events: none;
    }

    .reviewer-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      opacity: .72;
    }

    .reviewer-dot:nth-child(2) { background: var(--gold); }
    .reviewer-dot:nth-child(3) { background: var(--blue); }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-group::-webkit-scrollbar { display: none; }

    .filter-button {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      transition: border-color .16s ease, background .16s ease, color .16s ease;
    }

    .filter-button:hover { color: var(--ink); border-color: var(--line-strong); }
    .filter-button.is-active { color: var(--ink); border-color: var(--ink); background: var(--surface); }

    .thread-list { display: grid; }

    .comment-row {
      position: relative;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 13px;
      align-items: start;
      padding: 16px 17px;
      border-top: 1px solid var(--line);
      transition: background .18s ease, opacity .18s ease;
    }

    .comment-row:first-child { border-top: 0; }
    .comment-row:hover { background: rgba(250, 247, 240, .66); }
    .comment-row.is-hidden { display: none; }

    .comment-row.is-linked {
      background: linear-gradient(90deg, var(--reviewer-soft, var(--green-soft)), transparent 62%);
    }

    .comment-row.is-linked::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 3px;
      border-radius: 0 4px 4px 0;
      background: var(--reviewer-color, var(--green));
    }

    .pixel-avatar {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .comment-main {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .comment-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      min-height: 24px;
    }

    .comment-id {
      color: var(--ink);
      font-size: 13px;
      font-weight: 780;
      letter-spacing: -.015em;
    }

    .chunk-id {
      color: var(--muted);
      font-size: 10px;
      font-weight: 720;
      letter-spacing: .04em;
    }

    .status-badge {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border: 1px solid currentColor;
      border-radius: 999px;
      font-size: 9.5px;
      font-weight: 750;
      white-space: nowrap;
      opacity: .88;
    }

    .viewpoint {
      max-width: 820px;
      margin: 0;
      color: #282724;
      font-size: 14px;
      font-weight: 560;
      line-height: 1.62;
      letter-spacing: -.006em;
    }

    .ai-comment {
      justify-self: end;
      max-width: min(620px, 100%);
      display: inline-flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 2px;
      padding: 8px 10px;
      border: 1px solid #e7e0d5;
      border-radius: 13px 13px 4px 13px;
      background: linear-gradient(135deg, #fffefb, var(--surface-2));
      color: var(--ink-2);
      font-size: 12px;
      line-height: 1.5;
    }

    .ai-mark {
      min-width: 25px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--ink);
      border-radius: 7px;
      background: var(--lime);
      color: var(--ink);
      box-shadow: 1px 1px 0 var(--ink);
      font-size: 9px;
      font-weight: 820;
      line-height: 1;
    }

    .vote-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-2);
    }

    .vote-button {
      min-width: 48px;
      height: 31px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 8px;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      transition: color .16s ease, background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .vote-button:hover { color: var(--ink); background: var(--surface); }
    .vote-button:active { transform: scale(.97); }
    .vote-button.is-up { color: var(--green); background: var(--green-soft); border-color: rgba(22, 121, 90, .2); }
    .vote-button.is-down { color: var(--red); background: var(--red-soft); border-color: rgba(167, 71, 63, .2); }

    .vote-icon { font-size: 13px; line-height: 1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      z-index: 50;
      max-width: calc(100vw - 32px);
      padding: 10px 13px;
      border: 1px solid var(--ink);
      border-radius: 12px;
      background: var(--ink);
      color: #fff;
      box-shadow: 3px 3px 0 var(--lime);
      font-size: 12px;
      font-weight: 680;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity .2s ease, transform .22s var(--ease);
    }

    .toast.is-visible { opacity: 1; transform: translate(-50%, 0); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes nudge { 50% { transform: translateX(4px); } }
    @keyframes reveal { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .is-resolved .surface { animation: reveal .38s var(--ease) both; }
    .is-resolved .surface:nth-child(2) { animation-delay: .045s; }
    .is-resolved .surface:nth-child(3) { animation-delay: .09s; }

    @media (max-width: 940px) {
      .score-section { grid-template-columns: 156px minmax(0, 1fr); gap: 16px; padding: 17px; }
      .score-overview { min-height: 176px; padding: 12px; }
      .score-ring { width: 116px; }
      .score-value strong { font-size: 42px; }
      .reviewer-grid { grid-template-columns: 1fr; }
      .reviewer-card { min-height: 68px; }
      .dimension-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .comment-row { grid-template-columns: 48px minmax(0, 1fr); }
      .vote-group { grid-column: 2; justify-self: end; }

    @media (max-width: 680px) {

      .topbar { position: static; align-items: stretch; flex-direction: column; gap: 9px; margin: 0 0 12px; padding: 0; background: transparent; backdrop-filter: none; }
      .brand { align-self: flex-start; }

      .score-ring { width: 96px; grid-row: auto; }
      .score-ring::before { inset: 8px; }

        display: grid;

        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        padding: 1px 3px 5px 1px;
      }
      .reviewer-grid::-webkit-scrollbar { display: none; }

      .dimension-grid { grid-template-columns: 1fr; }
      .score-guide { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .leaderboard-section { grid-template-columns: 1fr; }
      .section-head { padding: 11px 12px; }
      .cloud-stage { height: 340px; margin: 10px; border-radius: 17px; }
      .comment-row { grid-template-columns: 42px minmax(0, 1fr); gap: 11px; padding: 14px 12px; }
      .pixel-avatar { width: 39px; height: 39px; border-radius: 10px; }
      .viewpoint { font-size: 13.5px; }
      .ai-comment { justify-self: stretch; }
      .vote-group { grid-column: 2; }
      .filter-group { max-width: 68vw; }
    }

    @media (max-width: 900px) {
      .community-grid { grid-template-columns: 1fr; }
      .community-board { position: static; max-height: none; overflow: visible; padding: 0; border: 0; box-shadow: none; background: transparent; }
      .mobile-board-tabs { display: grid; }
      [data-home-panel] { display: none; }
      [data-home-panel].is-active { display: block; }
      .home-boards-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {

      .community-copy h1 { font-size: 32px; line-height: 1.05; }

        width: 100%;
        min-height: 62px;
        padding: 6px 6px 6px 13px;
        border-radius: 19px;
      }
      .search-shell--landing .search-icon { display: none; }
      .search-shell--landing { grid-template-columns: minmax(0, 1fr) auto auto; }
      .search-shell--landing .analyze-button { min-width: 52px; min-height: 48px; padding: 0 15px; border-radius: 14px; }
      .search-shell--landing .button-label { display: none; }
      .search-shell--compact .button-label { display: none; }
      .search-shell--compact .analyze-button { padding: 0 10px; }
      .brand span:last-child { font-size: 14px; }
      .paper-title { font-size: 19px; }
      .surface { border-radius: 20px; }

      .cloud-tooltip { left: 12px !important; right: 12px; bottom: 12px; top: auto !important; width: auto; }
      .filter-group { max-width: 62vw; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }

    body.is-idle {
      background: #ffffff;
    }

    .is-idle .landing {
      min-height: 100svh;
      padding: 0;
      background: #ffffff;
    }

    .outrage-home {
      --oh-ink: #111111;
      --oh-muted: #9b9b9b;
      --oh-faint: #dcdcdc;
      --oh-line: #ececec;
      --oh-accent: #e10600;
      --oh-yellow: #ffe600;
      max-width: 1020px;
      margin: 0 auto;
      padding: 0 32px 72px;

      if (normalized === 'needs signal' || normalized === 'mixed signal') return 'Mixed review';
      if (normalized === 'weak signal') return 'Weak review';
      if (normalized === 'review signal') return 'review';
      return value;
    }

    function toneClass(tone) { return `tone-${toneMap[tone] ? tone : 'gold'}`; }

    function parsePaperTitle(value) {
      const clean = value.trim();
      try {
        const url = new URL(clean);
        if (url.hostname.includes('openreview.net')) {
          const id = url.searchParams.get('id');
          return id ? `OpenReview / ${id}` : 'OpenReview submission';
        }
        if (url.hostname.includes('doi.org')) {
          return `DOI / ${decodeURIComponent(url.pathname.replace(/^\//, ''))}`;
        }
        const tail = decodeURIComponent(url.pathname.split('/').filter(Boolean).pop() || url.hostname);
        return tail || url.hostname;
      } catch (_) {
        return clean;
      }
    }

    function setInputValue(value) {
      landingInput.value = value;
      topInput.value = value;
      syncClearButtons();
    }

    function syncClearButtons() {
      landingClear.hidden = !landingInput.value;
      topClear.hidden = !topInput.value;
    }

    function setBusy(isBusy, source) {
      state.busy = isBusy;
      const button = source === 'top' ? document.getElementById('topSubmit') : document.getElementById('landingSubmit');
      button.disabled = isBusy;
      button.classList.toggle('is-busy', isBusy);
      button.setAttribute('aria-busy', String(isBusy));
    }

    function showInputError() {
      const form = document.getElementById('landingSearch');
      form.classList.add('is-invalid');
      landingError.textContent = 'Enter a paper title or OpenReview ID';
      window.setTimeout(() => form.classList.remove('is-invalid'), 520);
      landingInput.focus();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function apiPath(path) {
      return `${API_BASE}${path}`;
    }

    async function apiFetch(path, options = {}) {
      if (!API_BASE) throw new Error('API base is not configured');
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      return fetch(apiPath(path), { cache: 'no-store', credentials: 'include', ...options, headers });
    }

    function paperIdFromValue(value) {
      const clean = value.trim();
      try {
        const url = new URL(clean);
        if (url.hostname.includes('openreview.net')) return url.searchParams.get('id') || '';
      } catch (_) {}
      const looksLikeOpenReviewId = /^[A-Za-z0-9_-]{10,}$/.test(clean) && /[A-Z0-9_-]/.test(clean);
      return looksLikeOpenReviewId ? clean : '';
    }

    function resultContainer(source) {
      return source === 'top' ? topResults : landingResults;
    }

    function hideSearchResults() {
      landingResults.hidden = true;
      topResults.hidden = true;
      landingResults.innerHTML = '';
      topResults.innerHTML = '';
    }

    function showSearchResults(items, source) {
      const container = resultContainer(source);
      paperSearchResults = items.slice(0, 8);
      const rows = paperSearchResults.map((item, index) => `
        <button class="paper-result-card" type="button" data-paper-result-index="${index}">
          <strong>${escapeHtml(item.title || item.paper_id)}</strong>
          <span>${escapeHtml(item.venue || item.conference_id || 'ICLR')} ${escapeHtml(item.year || '')} / ${Number(item.review_count || 0)} reviews</span>
        </button>`).join('');
      container.innerHTML = rows || '<div class="paper-result-card"><strong>No matching paper found</strong><span>Try an OpenReview id or a shorter title.</span></div>';
      container.hidden = false;
    }


    function setHomeStatus(message = '') {
      if (!homeStatus) return;
      homeStatus.textContent = message;
      homeStatus.hidden = !message;
    }

    function socialText(up, down, comments) {
      const u = Number(up || 0), d = Number(down || 0), c = Number(comments || 0);
      const commentPart = `${c} comments`;
      if (u + d === 0) return `${commentPart} / Be the first to vote`;
      return `${u} useful / ${d} disputed / ${commentPart}`;
    }

    function boardVoteText(up, down) {
      const u = Number(up || 0), d = Number(down || 0);
      if (u + d === 0) return 'No votes yet';
      return `${u} useful / ${d} disputed`;
    }

    function doiFromValue(value) {
      const clean = value.trim();
      try {
        const url = new URL(clean);
        if (url.hostname.includes('doi.org')) return decodeURIComponent(url.pathname.replace(/^\//, ''));
      } catch (_) {}
      return /^10\.\d{4,9}\/\S+$/i.test(clean) ? clean : '';
    }

    function showUnsupportedIdentifier(source) {
      const message = 'DOI lookup is not supported yet - search by paper title or OpenReview ID.';
      if (source === 'landing') landingError.textContent = message;
      else showToast(message);
      hideSearchResults();
    }

    function cloneHomeBoards(source) {
      const cloned = {};
      for (const key of BOARD_ORDER) {
        const board = source[key] || DEMO_HOME_BOARDS[key];
        cloned[key] = {
          key,
          label: board.label,
          emoji: board.emoji,
          count: Number(board.count || board.rows?.length || 0),
          tone: board.tone || (key === 'helpful' ? 'praise' : 'heat'),
          rows: (board.rows || []).map((row, index) => normalizeBoardRow(row, index, key, board.tone || (key === 'helpful' ? 'praise' : 'heat')))
        };
      }
      return cloned;
    }

    function initialHomeBoard() {
      const value = new URLSearchParams(location.search).get('b') || 'overall';
      return BOARD_ORDER.includes(value) ? value : 'overall';
    }

    function clampScore(value) {
      const score = Math.round(Number(value || 0));
      return Math.max(0, Math.min(100, score));
    }

    function reviewerKeyFromLabel(value, index) {
      const clean = String(value || '').trim();
      if (!clean) return `reviewer-${index + 1}`;
      return clean.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || `reviewer-${index + 1}`;
    }

    function normalizeBoardRow(raw, index, key, tone, fallback = {}) {
      const source = raw || {};
      const fb = fallback || {};
      const reviewer = String(source.reviewer || source.r || source.nickname || source.reviewer_name || source.reviewerKey || source.reviewer_key || fb.reviewer || `Reviewer #${index + 1}`);
      const paper = String(source.paper || source.p || source.paper_title || source.title || fb.paper || 'ICLR paper');
      const scoreSource = source.score ?? source.s ?? source.outrage_final ?? source.toxic_final ?? source.helpful_final ?? fb.score ?? 0;
      const paperId = String(source.paperId || source.paper_id || source.paperID || fb.paperId || `demo-${key}-${index + 1}`);
      const reviewerKey = String(source.reviewerKey || source.reviewer_key || fb.reviewerKey || reviewerKeyFromLabel(reviewer, index));
      return {
        quote: String(source.quote || source.t || source.best_quote || source.summary || fb.quote || '“Needs more experiments.”'),
        verdict: String(source.verdict || source.w || source.indictment || source.label || fb.verdict || 'Specificity pending real board-row data.'),
        reviewer,
        paper,
        venue: String(source.venue || fb.venue || 'ICLR 2025'),
        score: clampScore(scoreSource),
        humanCount: Number(source.humanCount ?? source.h ?? source.human_count ?? source.vote_total ?? ((Number(source.up || 0) + Number(source.down || 0)) || fb.humanCount || 0)),
        commentCount: Number(source.commentCount ?? source.comment_count ?? fb.commentCount ?? 0),
        paperId,
        reviewerKey,
        tone
      };
    }

    function rowsFromBoardPayload(value, key) {
      if (Array.isArray(value)) return { rows: value, count: value.length };
      if (value && typeof value === 'object') return { rows: Array.isArray(value.rows) ? value.rows : [], count: Number(value.count || value.n || value.rows?.length || 0), label: value.label, emoji: value.emoji || value.e, tone: value.tone };
      return { rows: [], count: 0 };
    }

    function legacyRows(items, key) {
      const demoRows = DEMO_HOME_BOARDS[key].rows;
      const tone = key === 'helpful' ? 'praise' : 'heat';
      return (items || []).map((item, index) => {
        const fallback = demoRows[index % demoRows.length];
        const quality = clampScore(item.score);
        const score = tone === 'praise' ? quality : clampScore(100 - quality);
        return normalizeBoardRow({ ...item, score, paper: item.paper_title, humanCount: Number(item.up || 0) + Number(item.down || 0) }, index, key, tone, fallback);
      });
    }

    function normalizeHomeBoards(payload = {}) {
      const boards = cloneHomeBoards(DEMO_HOME_BOARDS);
      const raw = payload.leaderboards || payload.boards || {};
      let usedModern = false;
      for (const key of BOARD_ORDER) {
        if (!(key in raw)) continue;
        const boardPayload = rowsFromBoardPayload(raw[key], key);
        if (!boardPayload.rows.length) continue;
        usedModern = true;
        const demoRows = DEMO_HOME_BOARDS[key].rows;
        const tone = boardPayload.tone || (key === 'helpful' ? 'praise' : 'heat');
        boards[key] = {
          key,
          label: boardPayload.label || DEMO_HOME_BOARDS[key].label,
          emoji: boardPayload.emoji || DEMO_HOME_BOARDS[key].emoji,
          count: Number(boardPayload.count || boardPayload.rows.length),
          tone,
          rows: boardPayload.rows.map((row, index) => normalizeBoardRow(row, index, key, tone, demoRows[index % demoRows.length]))
        };
      }
      if (!usedModern && raw && (Array.isArray(raw.red) || Array.isArray(raw.black))) {
        const black = Array.isArray(raw.black) ? raw.black : [];
        const red = Array.isArray(raw.red) ? raw.red : [];
        if (black.length) {
          boards.overall.rows = legacyRows(black, 'overall').slice(0, 8);
          boards.overall.count = Math.max(boards.overall.rows.length, boards.overall.count);
          boards.toxic.rows = legacyRows(black, 'toxic').slice(0, 20);
          boards.toxic.count = boards.toxic.rows.length;
        }
        if (red.length) {
          boards.helpful.rows = legacyRows(red, 'helpful').slice(0, 20);
          boards.helpful.count = boards.helpful.rows.length;
        }
      }
      const latest = Array.isArray(payload.latest_papers) ? payload.latest_papers : [];
      const audited = Number(payload.audited_count || payload.review_count || latest.reduce((sum, item) => sum + Number(item.review_count || 0), 0));
      if (audited > 0) {
        homeAuditedCount = audited;
        boards.overall.count = audited;
      }
      return boards;
    }

    function setBoardDeepLink(key) {
      const url = new URL(window.location.href);
      url.searchParams.set('b', key);
      window.history.replaceState({}, '', url);
    }

    function renderCommunityBoard() {
      const board = homeBoards[homeBoardKind] || homeBoards.overall;
      const copy = BOARD_COPY[board.tone];
      document.title = `${BRAND} - ${board.tone === 'praise' ? 'Acquitted' : 'The Verdict'}`;
      body.classList.toggle('praise', board.tone === 'praise');
      if (homeBrand) homeBrand.textContent = BRAND;
      if (outrageEyebrow) outrageEyebrow.textContent = copy.eyebrow(homeAuditedCount || board.count || 128);
      if (outrageTitle) outrageTitle.innerHTML = copy.title;
      if (outrageSub) outrageSub.textContent = copy.sub;
      if (boardTabs) {
        boardTabs.innerHTML = BOARD_ORDER.map(key => {
          const tabBoard = homeBoards[key] || DEMO_HOME_BOARDS[key];
          const selected = key === homeBoardKind;
          return `<button class="outrage-tab${selected ? ' is-active' : ''}" type="button" role="tab" aria-selected="${selected}" data-board-tab="${key}">${tabBoard.emoji} ${escapeHtml(tabBoard.label)}<span class="outrage-tab-count">${Number(tabBoard.count || 0)}</span></button>`;
        }).join('');
      }
      if (communityTicker) {
        const ticker = homeTickerHtml || '';
        communityTicker.hidden = !ticker;
        communityTicker.innerHTML = ticker;
      }
      if (outrageBoard) {
        outrageBoard.innerHTML = (board.rows || []).map((row, index) => boardRowHtml(row, index, board, copy)).join('') || '<p class="outrage-fine"><b>No ranking yet.</b> The demo board stays available while live data loads.</p>';
      }
      if (boardCta) boardCta.innerHTML = copy.cta;
      if (finePrint) finePrint.innerHTML = copy.fine;
    }

    function boardRowHtml(row, index, board, copy) {
      const rank = String(index + 1).padStart(2, '0');
      const human = Number(row.humanCount || 0);
      let comments = Number(row.commentCount || 0);
      if (!comments) comments = loadDemoComments(commentScopeKey(row)).length;
      const commentTail = comments > 0 ? ` · <b class="outrage-comments">${comments} comment${comments === 1 ? '' : 's'}</b>` : '';
      const metaTail = human > 0
        ? `<b>${escapeHtml(copy.hu(human))}</b>`
        : `<button class="outrage-meta-action" type="button" data-row-rate="${index}">${escapeHtml(copy.ai)}</button>`;
      return `
        <article class="outrage-row" role="link" tabindex="0" data-board-row="${index}">
          <div class="outrage-rank">${rank}</div>
          <div class="outrage-main">
            <h3 class="outrage-q">${escapeHtml(row.quote)}${index === 0 ? `<span class="outrage-stamp">${copy.stamp}</span>` : ''}</h3>
            <p class="outrage-why">${escapeHtml(row.verdict)}</p>
            <p class="outrage-meta">${escapeHtml(row.reviewer)} · ${escapeHtml(row.paper)} · ${escapeHtml(row.venue || 'ICLR 2025')} · ${metaTail}${commentTail}</p>
          </div>
          <div class="outrage-scorebox">
            <div class="outrage-num">${clampScore(row.score)}</div>
            <div class="outrage-unit">${copy.unit} · ${copy.tier(clampScore(row.score))}</div>
            <button class="outrage-rowrate" type="button" data-row-rate="${index}">${copy.rate}</button>
          </div>
        </article>`;
    }

    function renderCommunityHome() {
      renderCommunityBoard();
    }

    async function loadCommunityHome(year = homeYear) {
      homeYear = Number(year || 2025);
      homePapers = [];
      homeBoards = cloneHomeBoards(DEMO_HOME_BOARDS);
      usingDemoHome = true;
      homeAuditedCount = 128;
      homeTickerHtml = homeBoardKind === 'helpful'
        ? '<span class="hl">⚡ 24 human ratings this week</span> · latest: <b>“I owe this reviewer a beer”</b> on Reviewer #17 — 12 min ago'
        : '<span class="hl">⚡ 24 human ratings this week</span> · latest: <b>“brutal but fair”</b> on Reviewer #4 — 2 min ago';
      setHomeStatus('');
      renderCommunityHome();
      if (!API_BASE) return;
      try {
        const response = await apiFetch(`/api/home?conference=ICLR&year=${encodeURIComponent(homeYear)}&limit=12`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        homePapers = Array.isArray(payload.latest_papers) ? payload.latest_papers : [];
        homeBoards = normalizeHomeBoards(payload);
        usingDemoHome = false;
        homeTickerHtml = payload.ticker_html || payload.ticker || '';
        renderCommunityHome();
      } catch (error) {
        console.warn('Community home load failed; using demo board.', error);
        renderCommunityHome();
      }
    }

    function currentBoardRow(index) {
      const board = homeBoards[homeBoardKind] || homeBoards.overall;
      return (board.rows || [])[Number(index)] || null;
    }

    function openBoardRow(index) {
      const row = currentBoardRow(index);
      if (!row) return;
      if (!row.paperId || row.paperId.startsWith('demo-')) {
        showToast('Demo row - live scorecard will open when data is imported');
        return;
      }
      openHomePaper(row.paperId, 'landing');
    }

    function openRateModal(row = null, source = 'global') {
      const board = homeBoards[homeBoardKind] || homeBoards.overall;
      rateContext = { row, paperId: row?.paperId || '', reviewerKey: row?.reviewerKey || '', tone: row?.tone || board.tone, source, paperResults: [], reviewerResults: [], selectedPaper: null, conference: 'ICLR', query: '', comments: [], commentsLoading: false };
      rateModal.hidden = false;
      rateModalError.textContent = '';
      renderRateModal();
      if (!row) loadRatePapers('');
      else loadReviewerComments(row);
    }

    function closeRateModal() {
      rateModal.hidden = true;
      rateModalError.textContent = '';
    }

    function renderRateModal() {
      if (!rateModalBody) return;
      const row = rateContext.row;
      if (row) {
        const praise = rateContext.tone === 'praise';
        rateModalBody.innerHTML = `
          <p class="rate-kicker">${praise ? 'Acquittal vote' : 'Outrage vote'}</p>
          <h2 id="rateTitle">${escapeHtml(row.reviewer)}</h2>
          <p>${escapeHtml(row.paper)} · ${escapeHtml(row.venue || 'ICLR 2025')}</p>
          <div class="rate-review-card"><strong>${escapeHtml(row.quote)}</strong><span>${escapeHtml(row.verdict)} Current score: ${clampScore(row.score)}</span></div>
          <div class="rate-actions">
            <button class="rate-primary" type="button" data-rate-choice="${praise ? 'up' : 'down'}">${praise ? 'Vouch' : 'Pile on'}</button>
            <button class="rate-secondary" type="button" data-rate-choice="${praise ? 'down' : 'up'}">${praise ? 'Dispute' : 'Defend'}</button>
          </div>
          <form class="rate-comment-form" data-comment-form>
            <textarea class="rate-comment-input" id="rateCommentInput" rows="2" maxlength="1000" placeholder="${praise ? 'Say something nice about this review…' : 'Add your own take on this review…'}"></textarea>
            <button class="rate-primary rate-comment-submit" type="submit">Post comment</button>
          </form>
          <p class="rate-comments-head">Comments</p>
          <div class="rate-comments" id="rateComments">${renderRateCommentsHtml()}</div>`;
        return;
      }
      rateModalBody.innerHTML = `
        <p class="rate-kicker">Rate a reviewer</p>
        <h2 id="rateTitle">Pick the paper, then the reviewer.</h2>
        <p>Start with a conference and search the indexed corpus. Row links skip this step.</p>
        <div class="rate-grid">
          <label class="rate-control">Conference / year
            <select id="rateVenue">
              <option value="ICLR"${rateContext.conference === 'ICLR' ? ' selected' : ''}>ICLR 2025</option>
              <option value="NeurIPS"${rateContext.conference === 'NeurIPS' ? ' selected' : ''}>NeurIPS 2025</option>
              <option value="ICML"${rateContext.conference === 'ICML' ? ' selected' : ''}>ICML 2025</option>
            </select>
          </label>
          <label class="rate-control">Paper
            <input id="ratePaperSearch" value="${escapeHtml(rateContext.query || '')}" autocomplete="off" placeholder="Type to filter papers" />
          </label>
        </div>
        <div class="rate-list" id="ratePaperResults">${ratePaperResultsHtml()}</div>
        ${rateContext.reviewerResults.length ? `<div class="rate-list" id="rateReviewerResults">${rateReviewerResultsHtml()}</div>` : ''}`;
    }

    function ratePaperResultsHtml() {
      if (!rateContext.paperResults.length) return '<button type="button" disabled><strong>No papers loaded yet</strong><span>Type a title or wait for the API.</span></button>';
      return rateContext.paperResults.map((paper, index) => `<button type="button" data-paper-pick="${index}"><strong>${escapeHtml(paper.title || paper.paper_id)}</strong><span>${escapeHtml(paper.venue || paper.conference_id || rateContext.conference)} ${escapeHtml(paper.year || 2025)} · ${Number(paper.review_count || 0)} reviews</span></button>`).join('');
    }

    function rateReviewerResultsHtml() {
      return rateContext.reviewerResults.map((reviewer, index) => `<button type="button" data-reviewer-pick="${index}"><strong>${escapeHtml(reviewer.nickname || reviewer.reviewer_key || `Reviewer #${index + 1}`)}</strong><span>${escapeHtml(reviewer.summary || reviewer.label || 'Review scorecard row')}</span></button>`).join('');
    }

    async function loadRatePapers(query) {
      rateContext.query = query || '';
      rateModalError.textContent = '';
      if (!API_BASE) {
        rateModalError.textContent = 'Paper picker needs the production API.';
        return;
      }
      try {
        const response = await apiFetch(`/api/conferences/${encodeURIComponent(rateContext.conference)}/papers?query=${encodeURIComponent(rateContext.query)}&year=2025&limit=8`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        rateContext.paperResults = Array.isArray(payload.items) ? payload.items : [];
        rateContext.reviewerResults = [];
        renderRateModal();
      } catch (error) {
        console.warn('Rate paper lookup failed.', error);
        rateModalError.textContent = 'Could not load papers for rating.';
      }
    }

    async function selectRatePaper(index) {
      const paper = rateContext.paperResults[Number(index)];
      if (!paper) return;
      rateContext.selectedPaper = paper;
      rateModalError.textContent = '';
      try {
        const response = await apiFetch(`/api/papers/${encodeURIComponent(paper.paper_id)}/scorecard`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const scorecard = await response.json();
        rateContext.reviewerResults = Array.isArray(scorecard.reviewers) ? scorecard.reviewers : [];
        renderRateModal();
      } catch (error) {
        console.warn('Rate reviewer load failed.', error);
        rateModalError.textContent = 'This paper does not have a scorecard yet.';
      }
    }

    function selectRateReviewer(index) {
      const reviewer = rateContext.reviewerResults[Number(index)];
      const paper = rateContext.selectedPaper || {};
      if (!reviewer) return;
      const board = homeBoards[homeBoardKind] || homeBoards.overall;
      rateContext.row = normalizeBoardRow({
        quote: reviewer.summary || reviewer.label || 'Review scorecard row',
        verdict: reviewer.label || 'Reviewer quality scorecard is ready.',
        reviewer: reviewer.nickname || reviewer.reviewer_key,
        paper: paper.title,
        venue: `${paper.venue || paper.conference_id || rateContext.conference} ${paper.year || 2025}`,
        score: reviewer.score,
        humanCount: Number(reviewer.social?.up || 0) + Number(reviewer.social?.down || 0),
        paperId: paper.paper_id,
        reviewerKey: reviewer.reviewer_key
      }, 0, homeBoardKind, board.tone);
      rateContext.paperId = rateContext.row.paperId;
      rateContext.reviewerKey = rateContext.row.reviewerKey;
      rateContext.tone = board.tone;
      renderRateModal();
      loadReviewerComments(rateContext.row);
    }

    async function submitRateVote(vote) {
      const row = rateContext.row;
      if (!row) return;
      const key = `reviewer:${row.paperId}:${row.reviewerKey}`;
      const previous = voteState[key] || null;
      const next = previous === vote ? null : vote;
      if (next) voteState[key] = next;
      else delete voteState[key];
      saveVoteState(voteState);
      if (!previous && next) row.humanCount = Number(row.humanCount || 0) + 1;
      renderCommunityBoard();
      if (!API_BASE || row.paperId.startsWith('demo-')) {
        rateModalError.textContent = next ? 'Demo vote recorded locally.' : 'Demo vote removed locally.';
        renderRateModal();
        return;
      }
      try {
        const response = await apiFetch(`/api/papers/${encodeURIComponent(row.paperId)}/reviewers/${encodeURIComponent(row.reviewerKey)}/votes`, {
          method: 'POST', body: JSON.stringify({ vote: next || 'none' })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        rateModalError.textContent = next ? 'Vote recorded.' : 'Vote removed.';
        renderRateModal();
      } catch (error) {
        if (previous) voteState[key] = previous;
        else delete voteState[key];
        saveVoteState(voteState);
        if (!previous && next) row.humanCount = Math.max(0, Number(row.humanCount || 0) - 1);
        renderCommunityBoard();
        renderRateModal();
        rateModalError.textContent = 'Vote could not be saved.';
      }
    }

    function relTime(iso) {
      if (!iso) return 'just now';
      const then = new Date(iso).getTime();
      if (Number.isNaN(then)) return 'just now';
      const mins = Math.floor(Math.max(0, Date.now() - then) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function commentScopeKey(row) {
      if (row && row.paperId && row.reviewerKey) return `${row.paperId}::${row.reviewerKey}`;
      return `demo::${row?.paper || ''}::${row?.reviewer || ''}`;
    }

    function isDemoCommentRow(row) {
      return !API_BASE || !row || !row.paperId || !row.reviewerKey || String(row.paperId).startsWith('demo-');
    }

        return [];

        const response = await apiFetch(`/api/papers/${encodeURIComponent(row.paperId)}/reviewers/${encodeURIComponent(row.reviewerKey)}/comments`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        return Array.isArray(payload.items) ? payload.items : [];
      } catch (error) {
        return [];
      }

    async function postCommentFor(row, body) {
      const clean = (body || '').trim();
      if (!clean) return { ok: false, reason: 'empty' };
      if (isDemoCommentRow(row)) {
        const comment = { id: `demo-${demoCommentSeq++}`, body: clean, author: 'you', created_at: new Date().toISOString() };
        saveDemoComment(commentScopeKey(row), comment);
        return { ok: true, demo: true, items: loadDemoComments(commentScopeKey(row)) };
      }
      try {
        const response = await apiFetch(`/api/papers/${encodeURIComponent(row.paperId)}/reviewers/${encodeURIComponent(row.reviewerKey)}/comments`, {
          method: 'POST', body: JSON.stringify({ body: clean })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        return { ok: true, items: Array.isArray(payload.items) ? payload.items : [] };
      } catch (error) {
        return { ok: false, reason: 'network' };
      }
    }

    async function openHomePaper(paperId, source = 'landing') {
      if (!paperId) return;
      const paper = homePapers.find(item => item.paper_id === paperId) || { paper_id: paperId };

      if (!API_BASE && paperId === currentPaperId) {

    async function submitPaper(value, source = 'landing') {
      if (state.busy) return;
      const clean = (value || '').trim();
      if (!clean) {
        if (source === 'landing') showInputError();

          document.getElementById('topSearch').classList.add('is-invalid');

    async function submitPaperViaApi(value, source) {
      if (doiFromValue(value)) {
        showUnsupportedIdentifier(source);
        return true;
      }
      const paperId = paperIdFromValue(value);
      if (paperId) return loadScorecardFromApi(paperId, source, { title: parsePaperTitle(value) });
      const conference = (landingConference && landingConference.value) || 'ICLR';
      const response = await apiFetch(`/api/conferences/${encodeURIComponent(conference)}/papers?query=${encodeURIComponent(value)}&limit=8`);
      if (!response.ok) return false;
      const payload = await response.json();
      const items = Array.isArray(payload.items) ? payload.items : [];
      if (items.length === 1) return loadScorecardFromApi(items[0].paper_id, source, items[0]);
      showSearchResults(items, source);
      showToast(items.length ? 'Choose a paper' : 'No matching paper found');

    async function loadScorecardFromApi(paperId, source = 'landing', paper = {}) {
      const response = await apiFetch(`/api/papers/${encodeURIComponent(paperId)}/scorecard`);
      if (response.status === 404) {
        const queued = await requestScoringJob(paperId);
        if (queued) showPendingPaper(paperId, paper, source);
        else showNotIndexedPaper(paperId, paper, source);
        return true;
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const scorecard = await response.json();
      state.paperId = paperId;
      applyPublicScorecard(scorecard);
      hideSearchResults();
      enterResolvedView(source);
      if (source === 'top') showToast('Scorecard updated');
      return true;
    }

    async function requestScoringJob(paperId) {
      const response = await apiFetch(`/api/papers/${encodeURIComponent(paperId)}/scoring-jobs`, { method: 'POST', body: '{}' });

      if (!response.ok) throw new Error(`Unable to create scoring job: HTTP ${response.status}`);

      return true;

    async function loadPublicScorecard() {
      const initialParams = new URLSearchParams(location.search);
      const initialPaperId = initialParams.get('paper') || initialParams.get('id') || '';
      if (!API_BASE || !initialPaperId) return;

    function applyPublicScorecard(scorecard) {
      publicScorecard = scorecard;
      const paper = scorecard.paper || {};
      if (paper.paper_id) state.paperId = paper.paper_id;
      const summary = scorecard.summary || {};
      const reviewerItems = Array.isArray(scorecard.reviewers) ? scorecard.reviewers : [];
      const commentItems = Array.isArray(scorecard.comments) ? scorecard.comments : [];
      const topicItems = Array.isArray(scorecard.topics) ? scorecard.topics : [];
      leaderboards = scorecard.leaderboards || { red: [], black: [] };

      reviewers = reviewerItems.map((reviewer, index) => ({
        id: reviewer.reviewer_key || `R${index + 1}`,
        avatar: mascotKey(reviewer.nickname),
        name: reviewer.nickname || `Reviewer ${index + 1}`,
        score: Number(reviewer.score || 0),
        tone: reviewer.tone || scoreBand(Number(reviewer.score || 0)).className || 'green',
        label: plainBand(reviewer.label || scoreBand(Number(reviewer.score || 0)).label),
        summary: reviewer.summary || 'Reviewer comments scored by SecondOpinion.',
        social: reviewer.social || { up: 0, down: 0 },
        comments: Array.isArray(reviewer.comments) ? reviewer.comments : [],
        commentsLoaded: true,
        dimensions: (reviewer.dimensions || []).map(item => [item.label, Number(item.score || 0), item.criterion || 'Reviewer quality score.'])
      }));

      splitComments = commentItems.map((comment, index) => ({
        id: comment.reviewer_key,
        chunk: comment.chunk_id || `C${index + 1}`,
        tone: comment.tone || 'gold',
        view: comment.text || '',
        ai: comment.second_opinion || '',
        up: Number(comment.up || 0),
        down: Number(comment.down || 0)
      }));

      cloudWords = topicItems
        .filter(topic => topic && typeof topic.text === 'string' && topic.text.trim().length >= 3 && !CLOUD_STOPWORDS.has(topic.text.trim().toLowerCase()))
        .slice(0, 18)
        .map(topic => ({
          text: topic.text.trim(),
          size: Math.max(22, Math.min(60, Number(topic.size || 30))),
          x: 0,
          y: 0,
          tone: topic.tone || 'gold',
          reviewer: topic.reviewer_key || '',
          reviewerName: topic.nickname || '',
          chunk: topic.chunk || ''
        }));

      if (paper.title) document.getElementById('paperTitle').textContent = paper.title;
      if (paper.title) setInputValue(paper.title);
      if (summary.signal_label) document.getElementById('signalLabel').textContent = plainBand(summary.signal_label);
    }

    async function updateReviewerVote(reviewerId, action) {
      const key = `reviewer:${state.paperId}:${reviewerId}`;
      const previous = voteState[key] || null;
      const next = previous === action ? null : action;
      if (next) voteState[key] = next;
      else delete voteState[key];
      saveVoteState(voteState);
      renderLeaderboards();
      if (!API_BASE) {
        if (previous) voteState[key] = previous;
        else delete voteState[key];
        saveVoteState(voteState);
        renderLeaderboards();
        showToast('Vote requires the production API');
        return;
      }
      try {
        const response = await apiFetch(`/api/papers/${encodeURIComponent(state.paperId)}/reviewers/${encodeURIComponent(reviewerId)}/votes`, {
          method: 'POST',
          body: JSON.stringify({ vote: next || 'none' })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (payload.scorecard) {
          applyPublicScorecard(payload.scorecard);
          renderAll();
        }
        showToast(next ? 'Vote recorded' : 'Vote removed');
      } catch (error) {
        console.warn('Reviewer vote sync failed.', error);
        if (previous) voteState[key] = previous;
        else delete voteState[key];
        saveVoteState(voteState);
        renderLeaderboards();
        showToast('Vote could not be saved');

    function renderOverallScore() {
      const avg = publicScorecard?.summary?.overall_score ?? Math.round(reviewers.reduce((sum, reviewer) => sum + reviewer.score, 0) / Math.max(1, reviewers.length));

      if (reducedMotion.matches) {
        scoreEl.textContent = avg;
        return;
      }

      const start = performance.now();
      const duration = 480;
      function tick(now) {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        scoreEl.textContent = Math.round(avg * eased);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    const CLOUD_STOPWORDS = new Set('are not the and that this with from also had has have was were for but you your our out set get got there here than then they them its can will would could should may might one two use used using via per etc let make made more most some such into onto only very much many any all each both same other does did how why what when where which while because been being over under about'.split(' '));

    // Recompute non-overlapping positions client-side (ignore any stored x/y, which can collide).
    function layoutCloud(words) {
      const W = 1080, H = 520, cx = W / 2, cy = H / 2;
      const placed = [];
      for (const word of [...words].sort((a, b) => b.size - a.size)) {
        const w = Math.max(44, word.text.length * word.size * 0.58 + 12);
        const h = word.size * 1.15;
        let angle = 0, radius = 0, ok = false, x = cx - w / 2, y = cy - h / 2;
        for (let step = 0; step < 700; step++) {
          x = cx + radius * Math.cos(angle) - w / 2;
          y = cy + radius * Math.sin(angle) * 0.6 - h / 2;
          if (x >= 10 && y >= 10 && x + w <= W - 10 && y + h <= H - 10 &&
              !placed.some(p => x < p.x + p.w + 12 && x + w + 12 > p.x && y < p.y + p.h + 10 && y + h + 10 > p.y)) {
            ok = true; break;
          }
          angle += 0.4; radius += 2.2;
        }
        word.hidden = !ok;
        if (ok) { word.x = Math.round(x); word.y = Math.round(y); placed.push({ x, y, w, h }); }
      }
    }

    function renderCloud() {
      layoutCloud(cloudWords);
      cloudCanvas.innerHTML = cloudWords.filter(word => !word.hidden).map(word => `
        <button class="cloud-word" type="button" data-word-index="${cloudWords.indexOf(word)}" data-tone="${word.tone}" data-reviewer="${word.reviewer}" style="left:${word.x}px;top:${word.y}px;font-size:${word.size}px;" aria-label="${word.text}, ${word.reviewer}">${word.text}</button>`).join('');
      requestAnimationFrame(resetCloudView);
    }
